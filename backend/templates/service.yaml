apiVersion: v1
kind: Service

metadata:
  name: articles-backend-service
  namespace: {{ .Release.Namespace }}
  labels:
    app: articles-backend

spec:
  type: {{ .Values.service.type }}

  selector:
    app: articles-backend

  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: http