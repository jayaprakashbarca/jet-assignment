name: CI - Build and Push API to ECR

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: jay-api

jobs:
  # -------------------------------------------------------
  # JOB 1: Validate application and Docker image
  # -------------------------------------------------------
  validate:
    name: Validate Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Python dependencies
        run: |
          pip check

      - name: Validate Python syntax
        run: |
          python -m compileall -q api.py

      - name: Build Docker image for validation
        run: |
          docker build \
            --platform linux/amd64 \
            -t jay-api:ci \
            .

      - name: Inspect built image
        run: |
          docker image inspect jay-api:ci

  # -------------------------------------------------------
  # JOB 2: Push image to Amazon ECR
  # -------------------------------------------------------
  build-and-push:
    name: Build and Push to ECR
    runs-on: ubuntu-latest
    needs: validate

    if: github.event_name != 'pull_request'

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Configure AWS credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: arn:aws:iam::<AWS-ACC-ID>:role/jet-assignment-ecr-ci-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true

          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest

          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print pushed image details
        run: |
          echo "Docker image successfully pushed to ECR"
          echo ""
          echo "Immutable image:"
          echo "${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}"
          echo ""
          echo "Latest image:"
          echo "${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest"