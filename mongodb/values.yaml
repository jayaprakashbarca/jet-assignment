replicaCount: 3

replicaSetName: rs0

image:
  repository: mongo
  tag: "7.0"
  pullPolicy: IfNotPresent

service:
  name: mongodb-headless
  port: 27017
  targetPort: 27017

storage:
  size: 5Gi
  storageClassName: gp3

pdb:
  enabled: true
  minAvailable: 2

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi