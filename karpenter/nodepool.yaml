apiVersion: karpenter.sh/v1
kind: NodePool

metadata:
  name: general

spec:
  template:
    metadata:
      labels:
        workload-type: general

    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default

      requirements:
        - key: kubernetes.io/arch
          operator: In
          values:
            - amd64

        - key: kubernetes.io/os
          operator: In
          values:
            - linux

        - key: karpenter.sh/capacity-type
          operator: In
          values:
            - on-demand

        - key: karpenter.k8s.aws/instance-category
          operator: In
          values:
            - c
            - m
            - r

        - key: karpenter.k8s.aws/instance-generation
          operator: Gt
          values:
            - "5"

      expireAfter: 720h

      terminationGracePeriod: 5m

  limits:
    cpu: "50"
    memory: 100Gi

  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 1m