apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass

metadata:
  name: default

spec:
  role: jay-assignment-node-role

  amiSelectorTerms:
    - alias: al2023@latest

  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: jay-assignment

  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: jay-assignment

  metadataOptions:
    httpEndpoint: enabled
    httpProtocolIPv6: disabled
    httpPutResponseHopLimit: 1
    httpTokens: required

  tags:
    Name: jay-assignment-karpenter-node
    Environment: assignment
    ManagedBy: karpenter